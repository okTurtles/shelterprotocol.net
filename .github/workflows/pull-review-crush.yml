name: AI PR Review (Crush)

on:
  issue_comment:
    types: [created]

jobs:
  review:
    name: Automated PR Review
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review') &&
      (github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    concurrency:
      group: pr-review-crush-${{ github.event.issue.number }}
      cancel-in-progress: true
    # Configurable via the REVIEW_TIMEOUT_MINUTES repo variable (default: 30).
    # The 'Report timeout on trigger comment' step derives its TIMEOUT_SECONDS
    # from the same variable, so the two stay in sync automatically.
    timeout-minutes: ${{ fromJSON(vars.REVIEW_TIMEOUT_MINUTES || '30') }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # ── Provider configuration ─────────────────────────────
      # Set via Settings → Secrets and variables → Actions → Variables:
      #   REVIEW_PROVIDER: openrouter | zai-coding-plan
      #   REVIEW_MODEL:    stepfun/step-3.5-flash | glm-5
      REVIEW_PROVIDER: ${{ vars.REVIEW_PROVIDER || 'openrouter' }}
      REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'stepfun/step-3.5-flash' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

    steps:
      - name: Update comment with status
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"
          gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'
          gh api "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}" \
            -X PATCH \
            -f body="${COMMENT_BODY}

          ---

          _AI review [started](${RUN_URL})._"

      - name: Extract review command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          REVIEW_COMMAND=$(echo "$COMMENT_BODY" | grep -m1 -oP '^\s*\K/\S+(\s+\{\{[^}]*\}\})?')
          echo "REVIEW_COMMAND=$REVIEW_COMMAND" >> "$GITHUB_ENV"

      - name: Parse provider/model override
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Check for {{provider, model}} or {{provider, model, small_model}} override syntax after the /review command
          if [[ "$COMMENT_BODY" =~ ^[[:space:]]*/review[[:space:]]+\{\{[[:space:]]*([^,]+)[[:space:]]*,[[:space:]]*([^,}]+)[[:space:]]*(,[[:space:]]*([^}]+)[[:space:]]*)?\}\} ]]; then
            PROVIDER=$(echo "${BASH_REMATCH[1]}" | xargs)
            MODEL=$(echo "${BASH_REMATCH[2]}" | xargs)
            SMALL_MODEL=$(echo "${BASH_REMATCH[4]}" | xargs)
            # Validate provider and models contain only safe characters
            if [[ "$PROVIDER" =~ ^[a-zA-Z0-9_-]+$ ]] && [[ "$MODEL" =~ ^[a-zA-Z0-9_./-]+$ ]] && { [[ -z "$SMALL_MODEL" ]] || [[ "$SMALL_MODEL" =~ ^[a-zA-Z0-9_./-]+$ ]]; }; then
              echo "Overriding provider to: $PROVIDER"
              echo "Overriding model to: $MODEL"
              echo "REVIEW_PROVIDER=$PROVIDER" >> "$GITHUB_ENV"
              echo "REVIEW_MODEL=$MODEL" >> "$GITHUB_ENV"
              if [[ -n "$SMALL_MODEL" ]]; then
                echo "Overriding small model to: $SMALL_MODEL"
                echo "REVIEW_SMALL_MODEL=$SMALL_MODEL" >> "$GITHUB_ENV"
              fi
            else
              echo "::warning::Invalid provider or model format in override, using defaults"
            fi
          fi

      - name: Resolve provider settings
        run: |
          case "$REVIEW_PROVIDER" in
            openrouter)
              {
                echo "PROVIDER_API_URL=https://openrouter.ai/api/v1/chat/completions"
                echo "PROVIDER_API_KEY=$OPENROUTER_API_KEY"
                echo "CRUSH_MODEL=openrouter/$REVIEW_MODEL"
                echo "PROVIDER_DISPLAY=OpenRouter"
              } >> "$GITHUB_ENV"
              ;;
            zai-coding-plan)
              {
                echo "PROVIDER_API_URL=https://api.z.ai/api/coding/paas/v4/chat/completions"
                echo "PROVIDER_API_KEY=$ZAI_API_KEY"
                echo "CRUSH_MODEL=zai/$REVIEW_MODEL"
                echo "PROVIDER_DISPLAY=Z.AI"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unknown REVIEW_PROVIDER '$REVIEW_PROVIDER' (supported: openrouter, zai-coding-plan)"
              exit 1
              ;;
          esac

          # Set SMALL_MODEL based on provider (with override support)
          if [ -n "$REVIEW_SMALL_MODEL" ]; then
            SMALL_MODEL="$REVIEW_SMALL_MODEL"
          elif [ "$REVIEW_PROVIDER" = "zai-coding-plan" ]; then
            SMALL_MODEL="glm-5.1"
          else
            SMALL_MODEL="google/gemini-3-flash-preview"
          fi

          # Prefix small model with provider for crush
          case "$REVIEW_PROVIDER" in
            openrouter) echo "SMALL_MODEL=openrouter/$SMALL_MODEL" >> "$GITHUB_ENV" ;;
            zai-coding-plan) echo "SMALL_MODEL=zai/$SMALL_MODEL" >> "$GITHUB_ENV" ;;
          esac

      - name: Get PR number
        id: pr-info
        run: |
          echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Get PR details
        id: pr-details
        run: |
          gh api "/repos/${{ github.repository }}/pulls/${{ steps.pr-info.outputs.number }}" > /tmp/pr_data.json
          {
            echo "head_ref=$(jq -r '.head.ref' /tmp/pr_data.json)"
            echo "head_sha=$(jq -r '.head.sha' /tmp/pr_data.json)"
            echo "base_ref=$(jq -r '.base.ref' /tmp/pr_data.json)"
          } >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' /tmp/pr_data.json > /tmp/pr_body.txt
          jq -r '.title // ""' /tmp/pr_data.json > /tmp/pr_title.txt

      - name: Check for linked issues
        id: check-issues
        run: |
          # Collect all referenced issue numbers, de-duplicated preserving
          # PR-body order, as a space-separated list.
          # Matches closing/reference keywords followed by '#<number>' in the
          # PR body, e.g. "Closes #123, closes #456", "Fixes #12", "See #7".
          # "Closes #123, #456" only picks up #123 (each number needs its own
          # keyword).
          ISSUE_NUMS=$(grep -oiP '\b(?:fix(?:es|ed)?|close[sd]?|resolve[sd]?|ref(?:erences?)?|see)\s*#(\d+)' /tmp/pr_body.txt | grep -oP '\d+' | awk '!seen[$0]++' | tr '\n' ' ' | sed 's/ *$//' || true)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "has_issue=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_issue=true" >> "$GITHUB_OUTPUT"
            echo "issue_numbers=$ISSUE_NUMS" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr-details.outputs.head_sha }}
          fetch-depth: 0
          # Don't persist GH_TOKEN into .git/config (as the
          # http.https://github.com/.extraheader) — the workspace is
          # readable inside the review sandbox below, so persisted
          # credentials would leak the token to the review agent. The
          # repo is public, so the anonymous `git fetch origin` in
          # "Merge master into PR branch" still works; if this repo
          # ever becomes private, that fetch will need an explicitly
          # scoped token supplied some other way (NOT re-enabling
          # persist-credentials).
          persist-credentials: false

      - name: Merge master into PR branch
        env:
          BASE_REF: ${{ steps.pr-details.outputs.base_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BASE_REF"
          git merge "origin/$BASE_REF" --no-edit -m "Merge $BASE_REF for review" || {
            echo "::warning::Merge conflict detected, reviewing PR branch as-is"
            git merge --abort
            git reset --hard HEAD
          }

      - name: Generate diff
        env:
          BASE_REF: ${{ steps.pr-details.outputs.base_ref }}
        run: |
          git diff "origin/$BASE_REF" -U10 \
            -- . \
            ':!package-lock.json' ':!**/package-lock.json' \
            ':!pnpm-lock.yaml' ':!**/pnpm-lock.yaml' \
            ':!yarn.lock' ':!**/yarn.lock' \
            ':!go.sum' ':!**/go.sum' \
            ':!*.min.js' ':!*.min.css' \
            ':!node_modules/**' ':!**/node_modules/**' \
            ':!vendor/**' ':!**/vendor/**' \
            ':!dist/**' ':!**/dist/**' \
            ':!build/**' ':!**/build/**' \
            ':!*.svg' ':!**/*.svg' \
            ':!*.png' ':!**/*.png' \
            ':!*.jpg' ':!**/*.jpg' ':!*.jpeg' ':!**/*.jpeg' \
            ':!*.gif' ':!**/*.gif' \
            ':!*.ico' ':!**/*.ico' \
            ':!*.webp' ':!**/*.webp' \
            ':!*.woff' ':!**/*.woff' ':!*.woff2' ':!**/*.woff2' \
            ':!*.ttf' ':!**/*.ttf' ':!*.eot' ':!**/*.eot' \
            > /tmp/pr_diff.txt

          MAX_CHARS=100000
          DIFF_SIZE=$(wc -c < /tmp/pr_diff.txt)
          if [ "$DIFF_SIZE" -gt "$MAX_CHARS" ]; then
            head -c "$MAX_CHARS" /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            printf '\n\n... [diff truncated — %s bytes total, showing first %s]\n' "$DIFF_SIZE" "$MAX_CHARS" >> /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
          fi

          echo "Diff size: $DIFF_SIZE bytes"

          echo "::group::PR diff"
          cat /tmp/pr_diff.txt
          echo "::endgroup::"

      - name: Generate helpful context
        env:
          HAS_ISSUE: ${{ steps.check-issues.outputs.has_issue }}
          ISSUE_NUMBERS: ${{ steps.check-issues.outputs.issue_numbers }}
        run: |
          # Start with PR title, then always include PR description
          printf '<pr_title>\n%s\n</pr_title>\n' "$(cat /tmp/pr_title.txt)" > /tmp/helpful_context.txt
          printf '<pr_description>\n%s\n</pr_description>\n' "$(cat /tmp/pr_body.txt)" >> /tmp/helpful_context.txt

          if [ "$HAS_ISSUE" = "true" ]; then
            # Summarize at most this many linked issues to bound API calls
            # and prompt size; extras are noted but not summarized.
            MAX_ISSUES=5
            ISSUE_COUNT=0
            for ISSUE_NUMBER in $ISSUE_NUMBERS; do
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
              if [ "$ISSUE_COUNT" -gt "$MAX_ISSUES" ]; then
                echo "::warning::More than $MAX_ISSUES linked issues; skipping the rest"
                printf '<issue_summary>\nAdditional linked issues were not summarized (limit of %s reached).\n</issue_summary>\n' "$MAX_ISSUES" >> /tmp/helpful_context.txt
                break
              fi

              # Fetch the issue; on failure, note it and move to the next one
              if ! gh api "/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER" > /tmp/issue_data.json 2>/dev/null; then
                echo "::warning::Could not fetch issue #$ISSUE_NUMBER"
                printf '<issue_summary issue="#%s">\nIssue context unavailable.\n</issue_summary>\n' "$ISSUE_NUMBER" >> /tmp/helpful_context.txt
                continue
              fi

              # Build issue conversation text (title + body + all comments)
              {
                echo "## Issue #$ISSUE_NUMBER: $(jq -r '.title // ""' /tmp/issue_data.json)"
                echo ""
                jq -r '.body // ""' /tmp/issue_data.json
                echo ""
              } > /tmp/issue_conversation.txt

              # Fetch all comments on the issue
              gh api "/repos/$GITHUB_REPOSITORY/issues/$ISSUE_NUMBER/comments" --paginate \
                | jq -s 'add // []' > /tmp/issue_comments.json 2>/dev/null || echo "[]" > /tmp/issue_comments.json

              COMMENT_COUNT=$(jq 'length' /tmp/issue_comments.json 2>/dev/null || echo "0")
              if [ "$COMMENT_COUNT" -gt 0 ]; then
                {
                  echo "---"
                  echo ""
                  echo "### Comments"
                  echo ""
                  jq -r '.[] | "**\(.user.login)** (\(.created_at)):\n\(.body)\n\n---\n"' /tmp/issue_comments.json
                } >> /tmp/issue_conversation.txt
              fi

              # Summarize the issue conversation via LLM
              jq -n \
                --arg model "$REVIEW_MODEL" \
                --rawfile conversation /tmp/issue_conversation.txt \
                '{
                  model: $model,
                  messages: [{role: "user", content: ("Summarize the following GitHub issue conversation. Focus on: 1) What the issue is about, 2) Key discussion points, 3) Any final decision or conclusion reached about what to do (if one exists). Be concise but thorough.\n\n" + $conversation)}]
                }' > /tmp/context_payload.json

              HTTP_CODE=$(curl -s -w '%{http_code}' \
                "$PROVIDER_API_URL" \
                -H "Authorization: Bearer $PROVIDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d @/tmp/context_payload.json \
                -o /tmp/context_response.json)

              if [ "$HTTP_CODE" -eq 200 ] && jq -e '.choices[0].message.content' /tmp/context_response.json > /dev/null 2>&1; then
                SUMMARY=$(jq -r '.choices[0].message.content' /tmp/context_response.json)
              else
                echo "::warning::Issue #$ISSUE_NUMBER summarization failed (HTTP $HTTP_CODE), using raw issue text"
                SUMMARY=$(cat /tmp/issue_conversation.txt)
              fi

              printf '<issue_summary issue="#%s">\n%s\n</issue_summary>\n' "$ISSUE_NUMBER" "$SUMMARY" >> /tmp/helpful_context.txt
            done
          fi

          echo "::group::Helpful context"
          cat /tmp/helpful_context.txt
          echo "::endgroup::"

      - name: Build review prompt
        env:
          PROJECT_CTX: ${{ vars.PROJECT_CTX }}
        run: |
          PROJECT_CTX="${PROJECT_CTX:-Attached are a set of changes to a software project.}"

          printf '%s\n\n' "$PROJECT_CTX" > /tmp/agentic_prompt.txt
          cat >> /tmp/agentic_prompt.txt << 'PROMPT_END'
          Please have a look at these changes and thoroughly check them for:

          - Highest priority: any bugs, security issues, DRY violations, and improvements that can be made through code simplification
          - spelling or grammar mistakes in user-facing strings or log messages
          - poorly named identifiers like variables, selectors, functions/methods, types or classes

          When providing feedback, be specific and quote the concrete lines that are problematic, and then give your code improvement suggestions complete with actual code. When replying, always use Markdown and Markdown code fences to quote any lines. Avoid commenting on code that has no issues (no "you did a good job here!" fluff).

          When referencing sections of code, always mention the specific lines being referenced in the following manner to make it easy for developers to know where to look:

          - `file.js:841`
          - `file.vue:50-70`

          For each issue you identify, give it a rating of 🔴 for high importance & high confidence, 🟡 for medium importance & high confidence, and ⚪️ for issues of either lower confidence or lower importance. Prioritize finding 🔴 and 🟡 issues. Give your feedback in order of importance from most to least and number the issues sequentially in their headings.

          Also, for each issue, immediately after the issue heading please add these two checkboxes:

          - [ ] Addressed
          - [ ] Dismissed

          You have full access to all of the source code. You can query different parts of the project if you need additional context to help with your review. If you have access to a subagent tool please make use of it when investigating specific questions about the codebase (e.g. "where are all the locations where this function is called?", etc.) to help conserve on tokens. Pay attention to any parts of the project that might break or conflict because of the changes, or any bits that are no longer relevant and should be removed as a result of the changes.

          DO NOT make any edits or modifications to the code! DO NOT modify any files! Just output your review. If no problems are found, state that and do nothing else.

          ### Helpful Context

          PROMPT_END

          {
            cat /tmp/helpful_context.txt
            cat << 'SECTION_END'

          ### Changes to Review

          ```diff
          SECTION_END
            cat /tmp/pr_diff.txt
            printf '\n```\n'
          } >> /tmp/agentic_prompt.txt

      - name: Check prompt size
        id: size-check
        run: |
          MAX_TOKEN_CHARS=260000
          PROMPT_SIZE=$(wc -c < /tmp/agentic_prompt.txt)
          echo "Prompt size: $PROMPT_SIZE chars (~$((PROMPT_SIZE / 4)) tokens)"
          if [ "$PROMPT_SIZE" -gt "$MAX_TOKEN_CHARS" ]; then
            echo "too_large=true" >> "$GITHUB_OUTPUT"
          else
            echo "too_large=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post size limit comment
        if: steps.size-check.outputs.too_large == 'true'
        run: |
          PROMPT_SIZE=$(wc -c < /tmp/agentic_prompt.txt)
          TOKEN_EST=$((PROMPT_SIZE / 4))
          gh pr comment "${{ steps.pr-info.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "**Automated Review Notice**

          This PR exceeds the 260k character limit (~${TOKEN_EST} tokens estimated). The review cannot be performed automatically.

          Please break the PR into smaller pieces, or request a manual review.

          _[🔧 Workflow Run](${RUN_URL})_"

      # Tool access: `crush run` (non-interactive) auto-approves all permission
      # requests for its session, so `permissions.allowed_tools` alone can neither
      # grant nor restrict anything reliably. Enforcement is done via
      # `options.disabled_tools`, which removes tools from the agent entirely:
      # mutation tools (edit/multiedit/write) are disabled to keep the review
      # read-only, LSP/MCP tools are disabled because no LSPs or MCP servers
      # are configured here, and crush introspection tools (crush_info,
      # crush_logs) are disabled as irrelevant to reviewing. Everything else
      # (bash, download, sourcegraph, etc.) stays available to improve review
      # quality. The allowlist mirrors the enabled set as a belt-and-braces
      # measure in case a future crush release stops auto-approving in
      # non-interactive mode.
      - name: Install crush and bubblewrap
        if: steps.size-check.outputs.too_large == 'false'
        run: |
          # bubblewrap (bwrap) sandboxes the crush invocation in "Run
          # agentic review" so a prompt-injected agent cannot read
          # GH_TOKEN. ripgrep speeds up crush's code search (its grep
          # tool prefers rg when present). Neither is preinstalled on
          # ubuntu-latest.
          sudo apt-get update -qq
          sudo apt-get install -y -qq bubblewrap ripgrep

          # Ubuntu 24.04 restricts unprivileged user namespace creation
          # via AppArmor (kernel.apparmor_restrict_unprivileged_userns=1
          # on GitHub runners; see actions/runner-images#10015), and the
          # 24.04 bubblewrap deb ships no AppArmor profile for bwrap, so
          # bwrap fails with a permissions error out of the box. Lift the
          # restriction if (and only if) bwrap doesn't work as-is, so
          # this keeps working unchanged if a future image allows bwrap.
          if ! bwrap --unshare-all --die-with-parent --ro-bind / / --dev /dev --proc /proc -- true; then
            echo "bwrap blocked by AppArmor userns restriction; lifting kernel.apparmor_restrict_unprivileged_userns"
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
            bwrap --unshare-all --die-with-parent --ro-bind / / --dev /dev --proc /proc -- true
          fi

          npm install -g @charmland/crush
          mkdir -p ~/.config/crush
          cat > ~/.config/crush/crush.json << 'EOF'
          {
            "$schema": "https://charm.land/crush.json",
            "options": {
              "context_paths": ["AGENTS.md", "CRUSH.md", "CLAUDE.md", "README.md"],
              "disable_metrics": true,
              "disabled_tools": ["edit", "multiedit", "write", "lsp_diagnostics", "lsp_references", "lsp_restart", "list_mcp_resources", "read_mcp_resource", "crush_info", "crush_logs"]
            },
            "permissions": {
              "allowed_tools": ["agent", "agentic_fetch", "bash", "download", "fetch", "glob", "grep", "job_kill", "job_output", "ls", "sourcegraph", "todos", "view"]
            }
          }
          EOF

      - name: Run agentic review
        if: steps.size-check.outputs.too_large == 'false'
        run: |
          # crush runs with the `bash` tool enabled, so a malicious PR
          # could prompt-inject it into exfiltrating secrets. bwrap gives
          # crush (and every tool subprocess it spawns):
          #   - an environment containing ONLY the allowlisted variables
          #     below: GH_TOKEN and the rest of the runner env never
          #     enter the sandbox (--clearenv);
          #   - a read-only view of the filesystem, except the crush data
          #     dir, a `.crush` dir in the workspace, and a private /tmp;
          #   - a tmpfs over the runner temp dir, hiding step scripts and
          #     runner-internal files such as GITHUB_ENV;
          #   - a tmpfs over the runner agent install dir (best-effort),
          #     hiding registration credentials (.credentials /
          #     .credentials_rsaparams) and diagnostic logs. GitHub-hosted
          #     runners use JIT config and keep credentials in memory, so
          #     no such files may exist on disk — the mask mainly protects
          #     self-hosted or differently provisioned runners;
          #   - network access (required for the inference API).
          # OPENROUTER_API_KEY / ZAI_API_KEY are deliberately passed in:
          # crush reads whichever one its active provider needs directly
          # from the environment, so exfiltration of those keys remains
          # possible in principle — reviewers should still eyeball PR
          # contents.
          # CRUSH_MODEL / SMALL_MODEL are expanded by the outer shell and
          # arrive as plain command arguments, and the stdio redirections
          # are also performed outside the sandbox, so neither requires
          # env vars inside it.
          mkdir -p "$HOME/.local/share/crush" .crush

          # Mask any runner agent install dirs that exist, probing known
          # locations instead of hardcoding one path (the layout differs
          # across runner images: actions-runner vs. runners/<ver>). This
          # is best-effort: JIT-configured hosted runners keep credentials
          # in memory rather than on disk, so finding nothing is normal
          # and must not block the review.
          RUNNER_AGENT_DIRS=()
          for dir in /home/runner/actions-runner /home/runner/runners/*; do
            if [ -d "$dir" ]; then
              RUNNER_AGENT_DIRS+=("$dir")
            fi
          done
          if [ "${#RUNNER_AGENT_DIRS[@]}" -eq 0 ]; then
            echo "No runner agent install dir found to mask (expected on JIT-configured runners)"
          fi

          BWRAP=(
            bwrap
            --unshare-all --share-net
            --die-with-parent
            --ro-bind / /
            --dev /dev --proc /proc
            --tmpfs /tmp
            --tmpfs "$RUNNER_TEMP"
          )
          for dir in "${RUNNER_AGENT_DIRS[@]}"; do
            BWRAP+=(--tmpfs "$dir")
          done
          BWRAP+=(
            --bind "$HOME/.local/share/crush" "$HOME/.local/share/crush"
            --bind "$PWD/.crush" "$PWD/.crush"
            --clearenv
            --setenv PATH "$PATH"
            --setenv HOME "$HOME"
            --setenv TERM dumb
            --setenv OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
            --setenv ZAI_API_KEY "$ZAI_API_KEY"
            --
          )

          # Pre-flight: fail loudly if the sandbox does not actually hide
          # the token or the runner credentials — better no review than an
          # unsandboxed one. The runner agent dirs are passed as positional
          # arguments so the check probes the exact paths that were masked.
          "${BWRAP[@]}" sh -c '
            fail=0
            [ -z "$GH_TOKEN" ] || { echo "GH_TOKEN visible inside sandbox"; fail=1; }
            if git config --get http.https://github.com/.extraheader >/dev/null 2>&1; then
              echo "persisted git credentials visible inside sandbox"; fail=1
            fi
            for dir in "$@"; do
              if [ -e "$dir/.credentials" ] || [ -e "$dir/.credentials_rsaparams" ]; then
                echo "runner credentials visible inside sandbox at $dir"; fail=1
              fi
            done
            exit "$fail"
          ' sh "${RUNNER_AGENT_DIRS[@]}" || { echo "::error::Sandbox pre-flight failed — refusing to run the review unsandboxed"; exit 1; }

          "${BWRAP[@]}" crush run -q -m "$CRUSH_MODEL" --small-model "$SMALL_MODEL" < /tmp/agentic_prompt.txt > /tmp/agentic_review.txt 2>/tmp/crush_stderr.txt || {
            echo "::warning::Agentic review via crush failed"
            cat /tmp/crush_stderr.txt >&2
            echo "Agentic review unavailable (crush encountered an error)." > /tmp/agentic_review.txt
          }

          echo "Agentic review complete ($(wc -c < /tmp/agentic_review.txt) bytes)"

          echo "::group::Agentic (crush) review"
          cat /tmp/agentic_review.txt
          echo "::endgroup::"

      # This step can be removed if crush ever closes this issue: https://github.com/charmbracelet/crush/issues/2265
      - name: Extract review from agentic output
        if: false && steps.size-check.outputs.too_large == 'false'
        run: |
          jq -n \
            --arg model "$REVIEW_MODEL" \
            --rawfile text /tmp/agentic_review.txt \
            '{
              model: $model,
              messages: [{role: "user", content: ("The following text is the full output of an AI coding assistant that was asked to review a pull request. The output contains the assistant'\''s entire thought process, but the actual review with the found issues (if any) is only at the very end.\n\nExtract ONLY the final review portion and output it verbatim. Do not summarize, rephrase, or add anything. If there is no review in the text (e.g. the assistant failed or produced no review), output exactly: \"No review found in agentic output.\"\n\n---\n\n" + $text)}]
            }' > /tmp/extract_payload.json

          HTTP_CODE=$(curl -s -w '%{http_code}' \
            "$PROVIDER_API_URL" \
            -H "Authorization: Bearer $PROVIDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/extract_payload.json \
            -o /tmp/extract_response.json)

          if [ "$HTTP_CODE" -eq 200 ] && jq -e '.choices[0].message.content' /tmp/extract_response.json > /dev/null 2>&1; then
            jq -r '.choices[0].message.content' /tmp/extract_response.json > /tmp/agentic_review.txt
            echo "Extracted review ($(wc -c < /tmp/agentic_review.txt) bytes)"
          else
            echo "::warning::Review extraction failed (HTTP $HTTP_CODE), using full agentic output"
          fi

          echo "::group::Extracted agentic review"
          cat /tmp/agentic_review.txt
          echo "::endgroup::"

      - name: Use agentic review as final
        if: steps.size-check.outputs.too_large == 'false'
        run: |
          cp /tmp/agentic_review.txt /tmp/final_review.txt

      - name: Post review comment
        if: steps.size-check.outputs.too_large == 'false'
        run: |
          {
            echo "## Advanced AI Review"
            echo ""
            echo "- Type: Agentic (crush)"
            echo "- Model: ${REVIEW_MODEL}"
            echo ""
            echo "<details>"
            echo "<summary>Click to expand review</summary>"
            echo ""
            cat /tmp/final_review.txt
            echo ""
            echo "</details>"
            echo ""
            echo "---"
            echo "*Review [generated](${RUN_URL}) using \`${REVIEW_MODEL}\` via ${PROVIDER_DISPLAY}. Comment \`${REVIEW_COMMAND}\` to re-run.*"
          } > /tmp/review_comment.txt

          gh pr comment "${{ steps.pr-info.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/review_comment.txt

      - name: Post failure comment
        if: failure() && steps.pr-info.outputs.number
        run: |
          gh pr comment "${{ steps.pr-info.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "## Advanced AI Review

          - Type: Error
          - Model: ${REVIEW_MODEL}

          The review workflow failed. Check the [workflow run](${RUN_URL}) for details. Comment \`${REVIEW_COMMAND}\` to re-run."

      # Runs when the job is cancelled. The elapsed-time check distinguishes
      # the job timeout (timeout-minutes above) from a concurrency
      # cancel-in-progress cancellation, which must NOT add the note.
      - name: Report timeout on trigger comment
        if: cancelled()
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
          TIMEOUT_MINUTES: ${{ fromJSON(vars.REVIEW_TIMEOUT_MINUTES || '30') }}
        run: |
          # Derived from the same variable as the job-level `timeout-minutes`.
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          if [ -z "$JOB_STARTED_AT" ]; then
            echo "Job start time unknown — skipping timeout report"
            exit 0
          fi
          ELAPSED=$(( $(date +%s) - JOB_STARTED_AT ))
          if [ "$ELAPSED" -lt $(( TIMEOUT_SECONDS - 60 )) ]; then
            echo "Cancelled after ${ELAPSED}s (< timeout) — likely concurrency cancellation; skipping"
            exit 0
          fi
          BODY=$(gh api "/repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body') || {
            echo "::warning::Could not fetch comment body for timeout report"
            exit 0
          }
          gh api "/repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
            -X PATCH \
            -f body="${BODY}

          **The review job timed out.**"
          gh api "/repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID/reactions" \
            -f content='confused'
